<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activating Token – NELFUND</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; }
    body { background: #0a1628; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .card { background: rgba(255,255,255,0.04); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.06); border-radius: 40px; max-width: 480px; width: 100%; padding: 44px 32px; text-align: center; }
    .spinner { width: 64px; height: 64px; border: 4px solid rgba(0, 135, 81, 0.12); border-top: 4px solid #008751; border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 24px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    h2 { color: white; font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .sub { color: #94a3b8; font-size: 15px; margin-bottom: 20px; }
    .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #008751, #006b3f); border-radius: 10px; transition: width 0.4s ease; }
    #status { color: #cbd5e1; font-size: 14px; }
    .secure-badge { margin-top: 24px; color: #64748b; font-size: 10px; display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .secure-badge span { display: flex; align-items: center; gap: 4px; }
    .seal-stamp { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stamp { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 6px; padding: 4px 12px; color: #94a3b8; font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stamp strong { color: #fbbf24; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h2>⏳ Activating NIMC Token</h2>
    <p class="sub">Please wait while we verify your identity with NIMC</p>

    <div class="seal-stamp">
      <div class="stamp">🏛️ <strong>NIMC</strong> Gateway</div>
      <div class="stamp">🔒 <strong>NITDA</strong> Secure</div>
      <div class="stamp">🏦 <strong>CBN</strong> Compliant</div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div id="status">🔐 Connecting to NIMC secure gateway...</div>

    <div class="secure-badge">
      <span>🔒 Federal Secure Portal</span>
      <span>🇳🇬 NITDA Compliant</span>
      <span>📋 NIMC Integrated</span>
    </div>
  </div>

  <script>
    const userId = new URLSearchParams(window.location.search).get('userId');
    const steps = [
      '🔐 Connecting to NIMC secure gateway...',
      '✅ Verifying token payment with Paystack...',
      '🔄 Generating your NIMC Verification Token...'
    ];
    let i = 0;
    const progressFill = document.getElementById('progressFill');
    const status = document.getElementById('status');

    const interval = setInterval(() => {
      if (i < steps.length) {
        status.innerText = steps[i];
        progressFill.style.width = ((i + 1) / steps.length * 100) + '%';
        i++;
      } else {
        clearInterval(interval);
        status.innerText = '❌ Token activation failed – please contact NELFUND support.';
        progressFill.style.width = '100%';
        progressFill.style.background = '#ef4444';
        setTimeout(() => {
          window.location.href = `/fail?userId=${userId}`;
        }, 2500);
      }
    }, 1600);
  </script>
</body>
</html>
