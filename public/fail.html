<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Failed</title>
  <style>
    body { font-family: Arial; max-width: 400px; margin: 100px auto; text-align: center; }
    .box { background: #ffeeee; padding: 30px; border-radius: 10px; border: 1px solid red; }
    a { display: inline-block; margin-top: 20px; padding: 10px 20px; background: gold; color: black; text-decoration: none; border-radius: 5px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>❌ Code Generation Failed</h2>
    <p>We could not generate your withdrawal security code.</p>
    <p>Contact <strong>support@goldvault-pay.com</strong> – we will respond within 48 hours.</p>
    <p style="color:red; font-weight:bold;">No refund will be issued.</p>
    <a id="retryLink" href="#">🔄 Try Again</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('userId');
    document.getElementById('retryLink').href = userId ? `/dashboard?userId=${userId}` : '/';
  </script>
</body>
</html>
